<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="澳门VIP百家乐"/>
<meta name="theme-color" content="#070203"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="stylesheet" href="./css/app.css"/>
<title>Macau VIP Baccarat Simulator 2.0 Deep Visual</title>
</head>
<body>
<div id="splash"><div><b>MACAU VIP</b><span>Baccarat Simulator 2.0</span><i>Deep Visual Loading...</i></div></div>
<div id="app">
<header class="topbar"><button id="resetBtn">重置</button><strong>MACAU VIP BACCARAT 2.0</strong><span>余额 <b id="money">10,000</b></span></header>

<section class="vip-room">
  <div class="room-layer"></div>
  <div class="light-layer"></div>
  <div class="live-badge">LIVE · VIP ROOM</div>
  <img class="dealer-img" id="dealer" src="./assets/dealer/dealer-pro.svg" alt="dealer"/>
  <div class="shoe"><b>SHOE</b><span id="cutCard"></span></div>
  <div class="table-wrap"><img src="./assets/table/vip-table.svg" alt="table"/></div>

  <div class="card-stage">
    <div class="hand-area player"><h3>闲 PLAYER</h3><div id="pCards" class="cards"></div><div id="pScore" class="score">0</div></div>
    <div class="hand-area banker"><h3>庄 BANKER</h3><div id="bCards" class="cards"></div><div id="bScore" class="score">0</div></div>
  </div>

  <div id="noMore" class="no-more">NO MORE BETS<br><small>停止下注</small></div>
  <div id="toast" class="toast"></div>
  <div id="lastResult" class="last-result">最近一局：--</div>
  <div class="round">局号 GU<span id="roundNo">000001</span> · <span id="shoeLeft">牌靴416</span></div>
  <div id="shoeStats" class="shoe-stats">本靴 0 局</div>
</section>

<section class="bet-panel">
  <div id="timer" class="timer">15</div>
  <div class="side-bets">
    <button data-side="PP"><b>闲对</b><span>1:11</span><div id="stackPP" class="chip-stack"></div></button>
    <button data-side="Lucky7"><b>幸运七</b><span>闲7赢<br>2张1:6 / 3张1:15</span><div id="stackLucky7" class="chip-stack"></div></button>
    <button data-side="Super7"><b>超级幸运七</b><span>闲7赢庄6<br>4张1:30 / 5张1:40 / 6张1:100</span><div id="stackSuper7" class="chip-stack"></div></button>
    <button data-side="Lucky6"><b>幸运六</b><span>庄6赢<br>2张1:12 / 3张1:20</span><div id="stackLucky6" class="chip-stack"></div></button>
    <button data-side="BP"><b>庄对</b><span>1:11</span><div id="stackBP" class="chip-stack"></div></button>
  </div>
  <div class="main-bets">
    <button class="bet player" data-bet="P"><small>下注 <b id="betP">0</b></small><strong>闲</strong><span>1:1</span><div id="stackP" class="chip-stack"></div></button>
    <button class="bet tie" data-bet="T"><small>下注 <b id="betT">0</b></small><strong>和</strong><span>1:8</span><div id="stackT" class="chip-stack"></div></button>
    <button class="bet banker" data-bet="B"><small>下注 <b id="betB">0</b></small><strong>庄</strong><span>1:0.95</span><div id="stackB" class="chip-stack"></div></button>
  </div>
  <div class="actions"><button id="clearBtn">取消</button><button id="repeatBtn">重复</button><button id="doubleBtn">加倍</button></div>
</section>

<section class="chips">
  <button class="chip active" data-chip="100"><img src="./assets/chips/chip-100.svg"/></button>
  <button class="chip" data-chip="200"><img src="./assets/chips/chip-200.svg"/></button>
  <button class="chip" data-chip="1000"><img src="./assets/chips/chip-1000.svg"/></button>
  <button class="chip" data-chip="2000"><img src="./assets/chips/chip-2000.svg"/></button>
  <button class="chip" data-chip="5000"><img src="./assets/chips/chip-5000.svg"/></button>
</section>

<section class="control-panel">
  <button id="soundBtn">声音 开</button><button id="speedBtn">速度 标准</button><button id="autoBtn">自动 关</button><button id="pauseBtn">暂停</button><button id="roadClearBtn">清路单</button><button id="moneyResetBtn">重置资金</button>
</section>

<section id="statsPanel" class="stats-panel">
  <div class="stats-title">数据中心</div>
  <div class="stats-grid"><div><b id="statRounds">0</b><span>总局数</span></div><div><b id="statBetRounds">0</b><span>下注局</span></div><div><b id="statWinRate">0%</b><span>胜率</span></div><div><b id="statAvg">0</b><span>均局盈亏</span></div></div>
  <div class="bars"><p>庄 <i><em id="barB"></em></i><span id="barBTxt">0%</span></p><p>闲 <i><em id="barP"></em></i><span id="barPTxt">0%</span></p><p>和 <i><em id="barT"></em></i><span id="barTTxt">0%</span></p></div>
</section>

<section class="roadmap">
  <div id="trendBar" class="trend-bar"></div>
  <div class="road-head"><span class="r">庄 <b id="cntB">0</b></span><span class="b">闲 <b id="cntP">0</b></span><span class="g">和 <b id="cntT">0</b></span><span class="profit">盈亏 <b id="profit">0</b></span></div>
  <div id="beadRoad" class="bead-road"></div>
  <div class="right-roads"><div id="bigRoad" class="big-road"></div><div class="derived"><div><p>大眼路</p><div id="eyeRoad"></div></div><div><p>小路</p><div id="smallRoad"></div></div><div><p>曱甴路</p><div id="cockRoad"></div></div></div></div>
</section>
</div>
<div class="rotate-hint">横屏体验更接近 VIP 桌面</div>
<div id="fxLayer"></div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
